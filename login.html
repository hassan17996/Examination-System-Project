<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .form-control.is-invalid ~ .invalid-feedback {
        display: block;
      }
    </style>
  </head>
  <body>
    <section class="vh-100" style="background-color: #212529">
      <div class="container py-5 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col col-xl-10">
            <div class="card" style="border-radius: 1rem">
              <div class="row g-0">
                <div class="col-md-6 col-lg-5 d-none d-md-block">
                  <img
                    src="https://img.freepik.com/premium-photo/portrait-male-university-student-standing-outside-university-campus_1112411-7631.jpg"
                    alt="login form"
                    class="img-fluid"
                    style="
                      border-radius: 1rem 0 0 1rem;
                      height: 100%;
                      object-fit: cover;
                    "
                  />
                </div>

                <div class="col-md-6 col-lg-7 d-flex align-items-center">
                  <div class="card-body p-4 p-lg-5 text-black">
                    <form id="loginForm" novalidate>
                      <div class="d-flex align-items-center mb-3 pb-1">
                        <span class="h1 fw-bold mb-0">📝 ExamSys</span>
                      </div>

                      <h5
                        class="fw-normal mb-3 pb-3"
                        style="letter-spacing: 1px"
                      >
                        Sign into your account
                      </h5>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="email"
                          >Email address</label
                        >
                        <input
                          type="email"
                          id="email"
                          class="form-control form-control-lg"
                          placeholder="example@gmail.com"
                        />
                        <div class="invalid-feedback">
                          Please enter a valid email.
                        </div>
                      </div>

                      <div class="form-outline mb-4">
                        <label class="form-label" for="password"
                          >Password</label
                        >
                        <input
                          type="password"
                          id="password"
                          class="form-control form-control-lg"
                          placeholder="Your password"
                        />
                        <div class="invalid-feedback">
                          Please enter your password.
                        </div>
                      </div>

                      <div class="alert alert-danger d-none mb-3" id="errorMsg">
                        Incorrect email or password.
                      </div>
                      <div
                        class="alert alert-success d-none mb-3"
                        id="successMsg"
                      >
                        Login successful! Redirecting...
                      </div>

                      <div class="pt-1 mb-4">
                        <button
                          class="btn btn-dark btn-lg btn-block w-100"
                          type="submit"
                        >
                          Login
                        </button>
                      </div>

                      <a class="small text-muted" href="#">Forgot password?</a>
                      <p class="mb-5 pb-lg-2 mt-2" style="color: #393f81">
                        Don't have an account?
                        <a href="register.html" style="color: #393f81"
                          >Register here</a
                        >
                      </p>

                      <a href="#" class="small text-muted">Terms of use.</a>
                      &nbsp;
                      <a href="#" class="small text-muted">Privacy policy</a>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
  </body>
</html>
