<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time's Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d1f3c 0%, #102647 100%);
            min-height: 100vh;
        }

        .timeout-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .timeout-icon {
            font-size: 4rem;
            animation: shake 0.6s ease-in-out;
        }

        .timeout-title {
            font-size: 2rem;
            font-weight: 800;
            color: #e74c3c;
        }

        .stat-box {
            border-radius: 10px;
            padding: 14px 10px;
            background: #f8f9fa;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .btn-retake {
            background-color: #f39c12;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-top: 8px;
        }

        .btn-retake:hover {
            background-color: #c27b05;
            color: #fff;
        }

        .countdown-msg {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

    <div class="timeout-card text-center">

        <div class="timeout-icon mb-3">⏰</div>

        <h2 class="timeout-title mb-1">Time's Up!</h2>
        <p class="text-muted mb-4" id="student-msg"></p>

        <div class="row g-3 mb-4">
            <div class="col-4">
                <div class="stat-box">
                    <div class="stat-value text-success" id="stat-correct"></div>
                    <small class="text-muted">Correct</small>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-box">
                    <div class="stat-value text-warning" id="stat-unanswered"></div>
                    <small class="text-muted">Skipped</small>
                </div>
            </div>
            <div class="col-4">
                <div class="stat-box">
                    <div class="stat-value text-primary" id="stat-total"></div>
                    <small class="text-muted">Total</small>
                </div>
            </div>
        </div>

        <div class="alert alert-danger mb-4">
            ⏱ You ran out of time. Your answers have been submitted automatically.
        </div>

        <p class="countdown-msg mb-3">Redirecting to results in <span id="countdown">5</span>s...</p>

        <a href="grades.html" class="btn-retake">📊 View Full Results</a>
    </div>

    <script src="timeout.js"></script>
</body>
</html>
