<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grades Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center min-vh-100"
  >
    <div
      class="card shadow text-center p-4"
      style="max-width: 500px; width: 100%"
    >
      <h2 class="mb-1">Exam Results</h2>
      <p class="text-muted mb-3" id="student-msg"></p>

      <!-- Score -->
      <h1 class="display-4 fw-bold text-primary mb-0" id="score"></h1>
      <p class="text-muted mb-3" id="percent"></p>

      <!-- Progress Bar -->
      <div class="progress mb-4" style="height: 14px">
        <div
          class="progress-bar bg-primary"
          id="score-bar"
          style="width: 0%; transition: width 1s"
          role="progressbar"
        ></div>
      </div>

      <!-- Stats -->
      <div class="row g-2 mb-4">
        <div class="col-4">
          <div class="border rounded p-2">
            <div class="fw-bold text-success fs-5" id="stat-correct"></div>
            <small class="text-muted">Correct</small>
          </div>
        </div>
        <div class="col-4">
          <div class="border rounded p-2">
            <div class="fw-bold text-danger fs-5" id="stat-wrong"></div>
            <small class="text-muted">Wrong</small>
          </div>
        </div>
        <div class="col-4">
          <div class="border rounded p-2">
            <div class="fw-bold text-primary fs-5" id="stat-total"></div>
            <small class="text-muted">Total</small>
          </div>
        </div>
      </div>

      <!-- Remark -->
      <div class="alert" id="remark-alert"></div>
    </div>

    <script src="grades.js"></script>
  </body>
</html>
